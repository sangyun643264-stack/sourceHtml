
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>최상윤의 홈페이지</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f7fa;
    font-family:"Malgun Gothic", sans-serif;
    color:#333;
}

.container{
    max-width:1100px;
    margin:60px auto;
}

header{
    text-align:center;
    margin-bottom:50px;
}

header h1{
    font-size:42px;
    margin-bottom:10px;
}

header p{
    color:#777;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 300px);
    justify-content:center;
    gap:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h3{
    margin-bottom:20px;
    line-height:1.6;
}

.card a{
    text-decoration:none;
    background:#2d3748;
    color:white;
    padding:10px 20px;
    border-radius:10px;
}

.card a:hover{
    background:#1a202c;
}
</style>
</head>
<body>

<div class="container">

<header>

    </div>

    <div class="card">
